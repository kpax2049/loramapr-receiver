name: Receiver Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example v1.0.0)
        required: true
      channel:
        description: Release channel (stable or beta)
        required: true
        default: stable
      publish_release_assets:
        description: Upload dist artifacts as GitHub Release assets
        required: true
        default: 'true'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve Version
        id: release
        run: |
          to_int() {
            local value="${1:-}"
            value="$(printf '%s' "${value}" | tr '[:upper:]' '[:lower:]')"
            if [ "${value}" = "1" ] || [ "${value}" = "true" ] || [ "${value}" = "yes" ]; then
              echo "1"
            else
              echo "0"
            fi
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            CHANNEL="${{ github.event.inputs.channel }}"
            PUBLISH_RELEASE_ASSETS="$(to_int "${{ github.event.inputs.publish_release_assets }}")"
          else
            VERSION="${GITHUB_REF_NAME}"
            CHANNEL="stable"
            PUBLISH_RELEASE_ASSETS="1"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "publish_release_assets=${PUBLISH_RELEASE_ASSETS}" >> "$GITHUB_OUTPUT"

      - name: Run Tests
        run: go test ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build Artifacts
        run: packaging/release/build-artifacts.sh "${{ steps.release.outputs.version }}" "${{ steps.release.outputs.channel }}"

      - name: Validate .deb Artifacts
        run: |
          packaging/debian/validate-deb.sh dist/${{ steps.release.outputs.version }}/artifacts/loramapr-receiver_${{ steps.release.outputs.version }}_linux_amd64.deb
          packaging/debian/validate-deb.sh dist/${{ steps.release.outputs.version }}/artifacts/loramapr-receiver_${{ steps.release.outputs.version }}_linux_arm64.deb
          packaging/debian/validate-deb.sh dist/${{ steps.release.outputs.version }}/artifacts/loramapr-receiver_${{ steps.release.outputs.version }}_linux_armv7.deb

      - name: Validate Package Lifecycle Policy
        run: |
          packaging/debian/validate-lifecycle.sh dist/${{ steps.release.outputs.version }}/artifacts/loramapr-receiver_${{ steps.release.outputs.version }}_linux_amd64.deb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: receiver-artifacts-${{ steps.release.outputs.version }}-${{ steps.release.outputs.channel }}
          path: dist/${{ steps.release.outputs.version }}/artifacts/

      - name: Upload Release Assets
        if: steps.release.outputs.publish_release_assets == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          packaging/release/publish-github-release-assets.sh \
            "${{ steps.release.outputs.version }}" \
            "dist/${{ steps.release.outputs.version }}/artifacts" \
            "${{ github.repository }}"
