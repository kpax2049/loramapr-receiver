name: Receiver Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example v1.0.0)
        required: true
      channel:
        description: Release channel (stable or beta)
        required: true
        default: stable
  push:
    tags:
      - 'v*'

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve Version
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            CHANNEL="${{ github.event.inputs.channel }}"
          else
            VERSION="${GITHUB_REF_NAME}"
            CHANNEL="stable"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"

      - name: Run Tests
        run: go test ./...

      - name: Build Artifacts
        run: packaging/release/build-artifacts.sh "${{ steps.release.outputs.version }}" "${{ steps.release.outputs.channel }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: receiver-artifacts-${{ steps.release.outputs.version }}-${{ steps.release.outputs.channel }}
          path: dist/${{ steps.release.outputs.version }}/artifacts/
