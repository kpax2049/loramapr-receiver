name: Distribution Validate

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  linux-pi-distribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Artifacts
        run: packaging/release/build-artifacts.sh v0.0.0-ci stable

      - name: Publish Skeleton (Unsigned)
        run: SIGNING_MODE=none packaging/distribution/publish.sh v0.0.0-ci stable

      - name: Verify Published Skeleton
        run: packaging/distribution/verify.sh v0.0.0-ci stable
