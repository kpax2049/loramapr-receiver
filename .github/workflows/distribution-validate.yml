name: Distribution Validate

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  linux-pi-distribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go Tests
        run: go test ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gnupg

      - name: Build Artifacts
        run: packaging/release/build-artifacts.sh v0.0.0-ci stable

      - name: Assert Pi Appliance Image Is Not Produced
        run: |
          if compgen -G "dist/v0.0.0-ci/artifacts/*pi*img.xz" >/dev/null; then
            echo "unexpected Pi appliance image artifact found in active release flow" >&2
            ls -1 dist/v0.0.0-ci/artifacts/*pi*img.xz >&2
            exit 1
          fi

      - name: Validate Pi OS Lite Bootstrap Script
        run: bash -n packaging/linux/scripts/bootstrap-apt.sh

      - name: Validate .deb Artifacts
        run: |
          packaging/debian/validate-deb.sh dist/v0.0.0-ci/artifacts/loramapr-receiver_v0.0.0-ci_linux_amd64.deb
          packaging/debian/validate-deb.sh dist/v0.0.0-ci/artifacts/loramapr-receiver_v0.0.0-ci_linux_arm64.deb
          packaging/debian/validate-deb.sh dist/v0.0.0-ci/artifacts/loramapr-receiver_v0.0.0-ci_linux_armv7.deb

      - name: Validate Package Lifecycle Policy
        run: |
          packaging/debian/validate-lifecycle.sh dist/v0.0.0-ci/artifacts/loramapr-receiver_v0.0.0-ci_linux_amd64.deb

      - name: Publish Skeleton (Unsigned)
        run: SIGNING_MODE=none ENABLE_PAGES_LAYOUT=1 packaging/distribution/publish.sh v0.0.0-ci stable

      - name: Verify Published Skeleton
        run: packaging/distribution/verify.sh v0.0.0-ci stable

      - name: Verify Pages-Ready Skeleton
        run: packaging/distribution/pages/verify-pages-tree.sh v0.0.0-ci stable
